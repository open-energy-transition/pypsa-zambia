run:
  name: "validation_dispatch_zambia_2025"
  shared_cutouts: true

scenario:
  simpl: [""]
  ll: ["copt"]
  clusters: [10]
  opts: [Co2L-3h]        
  planning_horizons:
  - 2025                   
  sopts:
  - "144h"
  demand:
  - "AB"

snapshots:
  start: "2013-01-01"
  end: "2014-01-01"
  inclusive: "left" # end is not inclusive
countries: ["ZM"]
enable:
  build_cutout: false     
  retrieve_databundle: false
  retrieve_cost_data: true

atlite:
  nprocesses: 4
  cutouts:
    cutout-2013-era5:
      module: era5
      dx: 0.3
      dy: 0.3
      time: ["2013-01-01", "2014-01-01"]
      x: [21.5, 33.7]     
      y: [-18.8, -7.8]    


renewable:
  onwind:
    cutout: cutout-2013-era5
    correction_factor: 0.93
    extendable: false    
  offwind-ac:
    cutout: cutout-2013-era5
    extendable: false      
  offwind-dc:
    cutout: cutout-2013-era5
    extendable: false      
  solar:
    cutout: cutout-2013-era5
    correction_factor: 0.854337
    extendable: false     
  hydro:
    cutout: cutout-2013-era5
    extendable: false       
    normalization:
      method: irena
      year: 2013         
    multiplier: 1.0         
  csp:
    cutout: cutout-2013-era5
    extendable: false       


load_options:
  ssp: "ssp2-2.6"
  weather_year: 2013
  prediction_year: 2030   
  scale: 1                


electricity:
  extendable_carriers:
    Generator: []         
    StorageUnit: []        
    Store: []           
    Link: []           

  co2limit: 7.75e+7       

  powerplants_filter: (DateOut >= 2023 or DateOut != DateOut) and (DateIn <= 2023 or DateIn != DateIn)
  custom_powerplants: replace # set to "merge" or "replace" if you have a custom_powerplants.csv for Zambia

  conventional_carriers: [oil, OCGT, CCGT, coal, geothermal, biomass]
  renewable_carriers: [solar, onwind, hydro]

  estimate_renewable_capacities:
    stats: false
  operational_reserve:
    activate: false
lines:
  s_max_pu: 0.7    
  s_nom_extendable: false
  s_nom_max: .inf
  s_nom_max_min: -.inf

costs:
  year: 2025     

cluster_options:
  simplify_network:
    exclude_carriers: []


sector:
  enable:
    heat: false
    biomass: false
    industry: true
    shipping: false
    aviation: false
    land_transport: false
    rail_transport: false
    agriculture: false
    residential: false
    services: false

solving:
  solver:
    name: highs
    options: highs-default
