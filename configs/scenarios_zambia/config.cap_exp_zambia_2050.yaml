# Scenario diff — 2050 planning horizon
# Merges with: configs/cap_exp_zambia_base.yaml

run:
  name: cap_exp_zambia_2050
  base_config: configs/cap_exp_zambia_base.yaml

electricity:
  powerplants_filter: (DateOut >= 2050 or DateOut != DateOut) and (DateIn <= 2050 or DateIn != DateIn)
  extendable_carriers:
    Generator: [solar, onwind]

load_options:
  scale: 3.89  # IRP 2050 demand = 75,654 GWh / SSP2 base ~19,424 GWh

costs:
  year: 2050
  marginal_cost:
    coal: 79.92  # IRP Table 9 — 2050 coal fuel cost
    oil: 4.70
