# Scenario diff — 2025 planning horizon
# Merges with: configs/cap_exp_zambia_base.yaml

run:
  name: cap_exp_zambia_2025
  base_config: configs/cap_exp_zambia_base.yaml

electricity:
  powerplants_filter: (DateOut >= 2025 or DateOut != DateOut) and (DateIn <= 2025 or DateIn != DateIn)
  extendable_carriers:
    Generator: [solar, onwind]

renewable:
  hydro:
    # TODO Harmonize across different scenarios
    multiplier: 2.19

load_options:
  scale: 1.44  # IRP Table 3 2026 demand 22,915 GWh / DemandCast base 15,909 GWh

costs:
  year: 2025
