# Base configuration for Zambia capacity expansion scenarios.
# Parameters common to all planning years (2025, 2030, 2040, 2050).
# Year-specific overrides live in configs/scenarios_zambia/config.*.yaml.

run:
  name: "cap_exp_zambia_base"   # overridden by each scenario diff
  shared_cutouts: true

enable:
  retrieve_databundle: false
  build_natura_raster: false

existing_capacities:
  grouping_years_power: [1960, 1965, 1970, 1975, 1980, 1985, 1990, 1995, 2000, 2005, 2010, 2015, 2020, 2025, 2030, 2035, 2040, 2045, 2050]

scenario:
  simpl: [""]
  ll: ["copt"]
  clusters: ["22"]
  opts: [3h]

cluster_options:
  simplify_network:
    p_threshold_drop_isolated: 100  # MW — drop isolated subnetworks with load below this threshold

electricity:
  biomass_potential: false  # biomass committed via custom_powerplants.csv
  extendable_carriers:      # default: all capacity committed; override per scenario
    Generator: []
    StorageUnit: []
    Store: []
    Link: []

  automatic_emission: false
  automatic_emission_base_year: 1990

  custom_powerplants: replace
  powerplants_filter: (DateOut >= 2025 or DateOut != DateOut) and (DateIn <= 2025 or DateIn != DateIn)  # default; overridden per scenario

  conventional:
    coal:
      p_min_pu: 0.0
    oil:
      p_min_pu: 0.0

renewable:
  hydro:
    multiplier: 2.19        # ERA5→IRP calibration for 2030-2050; override to 2.19 for 2025
  solar:
    resource:
      method: pv
      panel: CdTe            # First Solar CdTe — dominant utility-scale technology in Africa; better high-irradiance & heat performance than CSi
      orientation: latitude_optimal
    correction_factor: 0.93  # Africa performance ratio: dust soiling + temperature derating + mismatch losses (replaces manual 1.20 ERA5 boost)
  onwind:
    resource:
      method: wind
      turbine: NREL_ReferenceTurbine_2020ATB_4MW  # 110 m hub height — modern reference turbine for African low-medium wind sites
    correction_factor: 0.83  # Africa performance ratio: turbine availability + wake losses + curtailment (replaces manual 1.20 ERA5 boost)

solving:
  options:
    load_shedding: 100


lines:
  s_max_pu: 1.0
  s_nom_extendable: true
  length_factor: 1.0  # Zambia flat plateau terrain — no route detour penalty
  ac_types:
    330.: "ACSR Zebra 2-bundle 330.0"  # 1.72 kA / 840 MVA — SAPP standard 330 kV expansion conductor

load_options:
  demand_weights:
    mining: 0.76
    gdp: 0.24
  zambia_demand_distribution: true
  scale: 1.15  # default to 2025; overridden per scenario

costs:
  year: 2025  # default; overridden per scenario
  fill_values:
    discount rate: 0.10  # IRENA non-OECD standard; consistent with Zambia IPP financing (7.65–10.4% per IRP Annex 2)
  investment: # EUR/MW — IRP Table 5 (Zambia 2023), converted at 0.7532 EUR/USD
    hydro: 2862160        # 3.800 mUSD/MW — Hydro Storage
    ror: 965602           # 1.282 mUSD/MW — Hydro Run-of-River
    coal: 807430          # 1.072 mUSD/MW — Coal Thermal
    geothermal: 1205120   # 1.600 mUSD/MW — Geothermal
    biomass: 474516       # 0.630 mUSD/MW — Biomass
    solar-utility: 756966 # 1.005 mUSD/MW — Solar PV (utility-scale)
    onwind: 969368        # 1.287 mUSD/MW — Wind Onshore
    nuclear: 4865672      # 6.460 mUSD/MW — Nuclear
    csp-tower: 4973380    # 6.603 mUSD/MW — Solar CSP
    oil: 506904           # 0.673 mUSD/MW — Mixed Fuel
  marginal_cost: # EUR/MWh — IRP Table 5 (Zambia 2023), converted at 0.7532 EUR/USD
    solar: 0
    onwind: 0
    offwind: 0.015
    hydro: 1.05
    ror: 0.
    coal: 0   # IRP Table 9 — override per scenario if fuel price differs
    oil: 0
    geothermal: 0.87
    biomass: 4.14
    nuclear: 3.46
    csp: 0.
  FOM: # % of investment per year — IRP Annex 3
    solar: 1.1
    solar-utility: 1.1
    onwind: 2.6
    coal: 1.5
    hydro: 1.6
    ror: 1.6
    biomass: 3.6
    geothermal: 1.6
    nuclear: 1.5
    oil: 2.0
  co2_emissions: # tCO2/MWh — IRP Table 5 (Zambia 2023)
    hydro: 0.025
    ror: 0.024
    coal: 0.830
    geothermal: 0.038
    biomass: 0.038
    solar: 0.048
    onwind: 0.011
    nuclear: 0.012
    csp-tower: 0.000
    oil: 0.490
  rooftop_share: 0  # utility-scale solar only
  lifetime: # years — IRP Table 5 (Zambia 2023)
    hydro: 50
    ror: 35
    coal: 40
    geothermal: 35
    biomass: 25
    solar: 25
    solar-utility: 25
    onwind: 30
    nuclear: 50
    csp-tower: 25
    oil: 30
